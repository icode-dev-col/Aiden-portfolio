<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Staff Login - iCode Artisan Coffee</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="navbar">
    <a href="index.html" class="logo-wrap">
      <div class="logo-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>
      </div>
      <div>
        <h1 class="brand-title">iCode Coffee Shop</h1>
        <p class="brand-subtitle">Artisan Roasts • iCode Exclusive</p>
      </div>
    </a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="order.html">Order</a>
      <a href="customers.html">Customers</a>
      <a href="login.html" class="active">Staff Login</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-header">
      <h2>🔐 Staff Access Panel</h2>
      <p>Secure administrative portal for baristas.</p>
    </div>

    <div class="form-container">
      <div style="background: var(--color-cream); color: var(--color-espresso); padding: 15px; border-radius: 8px; margin-bottom: 24px; text-align: center; font-size: 14px; border: 1px dashed rgba(26, 18, 11, 0.2);">
        Demo Login: <b>barista</b> / <b>coffee123</b>
      </div>

      <div id="loginError" class="error" style="display: none; color: #D47A43; margin-bottom: 20px; font-weight: 600; text-align: center; background: #fff2eb; padding: 12px; border-radius: 8px;">Oops! Wrong username or password.</div>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="barista" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="coffee123" required />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-full" style="justify-content: center;">Authenticate</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 iCode Coffee Shop • Built for Students & Instructors</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
